name: Web validation

on:
  push:
    branches:
      - feature/minipay-agent-proof
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-validation.yml'

jobs:
  validate-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
