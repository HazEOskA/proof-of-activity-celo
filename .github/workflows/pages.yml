name: Deploy Talent verification site

on:
  push:
    branches: [main]
    paths:
      - "talent/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure and enable Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: talent

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
